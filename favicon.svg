<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg-grad)"/>
  <!-- Subtle border glow -->
  <rect width="62" height="62" x="1" y="1" rx="11" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- K letter -->
  <text
    x="9"
    y="46"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="32"
    fill="url(#text-grad)"
    letter-spacing="-1"
  >KC</text>
  <!-- Accent dot -->
  <circle cx="56" cy="14" r="3" fill="#00d4ff" opacity="0.8"/>
</svg>
